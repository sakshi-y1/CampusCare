    <!DOCTYPE html>
    <html>
    <head>
        <title>Staff Profile | CampusCare</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/staff_dashboard.css') }}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

    <body>

    <!-- HEADER -->
    <header class="main-header">
        <div class="navbar">

            <div class="nav-left">
                <div class="logo">
                    <i class="fas fa-university"></i>
                    <div class="logo-text">
                        <span class="brand">CampusCare</span>
                        <span class="tagline">Your Concern, Our Commitment</span>
                    </div>
                </div>
            </div>

            <div class="nav-right">
                <a href="/staff">Dashboard</a>
                <a href="/logout" class="logout-btn">Logout</a>
            </div>

        </div>
    </header>

    <!-- PROFILE CONTENT -->
    <div class="profile-wrapper">

        <div class="profile-card">
            <div class="profile-header">
                <i class="fas fa-user-circle profile-icon"></i>
                <h2 align="center">{{ staff.name }}</h2>
                <p class="role">Staff Member</p>
            </div>

            <div class="profile-details">
                <div class="detail">
                    <span>Email:</span>
                    <p>{{ staff.email }}</p>
                </div>

                <div class="detail">
                    <span>Department:</span>
                    <p>{{ staff.department }}</p>
                </div>

                <div class="detail">
                    <span>Staff ID:</span>
                    <p>{{ staff._id }}</p>
                </div>
            </div>


        </div>

    </div>

    <!-- FOOTER -->
    <footer class="main-footer">
        © 2026 CampusCare | All Rights Reserved
    </footer>

    </body>
    </html>
