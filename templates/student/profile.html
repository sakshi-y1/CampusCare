<!DOCTYPE html>
<html>
<head>
    <title>My Profile | CampusCare</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
    <div class="navbar">
        <div class="nav-left">
            <div class="logo">
                <i class="fas fa-university"></i>
                <span>CampusCare</span>
            </div>
            <p class="tagline">Your Concern, Our Commitment</p>
        </div>

        <div class="nav-right">
            <a href="/student">Dashboard</a>
            <a href="/student/my-complaints">My Complaints</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>

    </div>
</header>

<!-- ================= MAIN CONTENT ================= -->

<div class="main-content">
    <div class="auth-container">
        <h2>My Profile</h2>

        <form method="post">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ user.name }}" required>

            <label>Email</label>
            <input type="email" value="{{ user.email }}" disabled>

            <label>Department / Class</label>
            <input type="text" name="department" value="{{ user.department or '' }}">

            <button type="submit">Update Profile</button>
        </form>

        
    </div>
</div>

<!-- ================= FOOTER ================= -->

<footer class="main-footer">
    © 2026 CampusCare | All Rights Reserved
</footer>

</body>
</html>
