<!DOCTYPE html>
<html>
<head>
    <title>New Complaint | CampusCare</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Font Awesome for Logo Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="main-header">
    <div class="navbar">
        
        <div class="nav-left">
            <div class="logo">
                <i class="fas fa-university"></i>
                <span>CampusCare</span>
            </div>
            <p class="tagline">Your Concern, Our Commitment</p>
        </div>

        <div class="nav-right">
            <a href="/student">Dashboard</a>
            <a href="/student/my-complaints">My Complaints</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>

    </div>
</header>
<!-- ===== END HEADER ===== -->


<!-- ===== FORM SECTION ===== -->
 <div class="main-content">
<div class="auth-container">
    <h2>Register New Complaint</h2>

    <form method="post" enctype="multipart/form-data">
        <label>Student Name</label>
        <input type="text" name="name" required>

        <label>Class / Roll No</label>
        <input type="text" name="roll" required>

        <label>Title</label>
        <input type="text" name="title" required>

        <label>Upload Complaint Document</label>
        <input type="file" name="file" accept=".doc,.docx,.pdf,.png,.jpg,.jpeg" required>

        <label>Description</label>
        <textarea name="description" rows="4" required></textarea>

        <button type="submit">Submit Complaint</button>
    </form>
</div>
</div>
<!-- ===== END FORM ===== -->


<!-- ===== FOOTER ===== -->
<footer class="main-footer">
    <p>© 2026 CampusCare | All Rights Reserved</p>
</footer>
<!-- ===== END FOOTER ===== -->

</body>
</html>
